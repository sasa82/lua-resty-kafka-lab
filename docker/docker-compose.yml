version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:6.0.0
    container_name: test-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-lab

  kafka-zk:
    image: confluentinc/cp-kafka:7.5.0
    container_name: test-kafka-zookeeper
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: >
        INTERNAL://0.0.0.0:29092,
        EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: >
        INTERNAL://kafka-zk:29092,
        EXTERNAL://BROKER_IP:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - kafka-lab

  kafka-kraft:
    image: apache/kafka:4.2.0
    container_name: test-kafka-kraft
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-kraft:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        CONTROLLER:PLAINTEXT,
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: >
        CONTROLLER://kafka-kraft:9094,
        INTERNAL://0.0.0.0:29093,
        EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: >
        INTERNAL://kafka-kraft:29093,
        EXTERNAL://BROKER_IP:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: kraft-cluster-id-0001
    networks:
      - kafka-lab

networks:
  kafka-lab:
    driver: bridge

