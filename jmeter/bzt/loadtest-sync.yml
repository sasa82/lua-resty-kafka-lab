execution:
  - scenario: kafka-sync
    concurrency: ${CONCURRENCY}
    ramp-up: ${RAMP_UP}
    hold-for: ${DURATION}

scenarios:
  kafka-sync:
    requests:
      - url: http://${TARGET_HOST}:${TARGET_PORT}${SYNC_ENDPOINT}
        method: POST
        headers:
          Content-Type: application/json
          X-Partition-Key: "${__Random(1,100)}"
        body: '{"source":"bzt-loadtest","mode":"sync","ts":"${__time()}","thread":"${__threadNum}"}'

reporting:
  - module: console
  - module: final-stats
    summary: true
    percentiles: true

